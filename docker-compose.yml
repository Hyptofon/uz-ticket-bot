version: '3.8'

services:
  uz-ticket-watcher:
    build: .
    container_name: uz-ticket-watcher
    restart: unless-stopped        # Автоперезапуск при падінні

    env_file:
      - .env

    volumes:
      # SQLite база даних — зберігається між перезапусками
      - ./data:/app/data

      # Playwright persistent браузерний профіль (для CAPTCHA fallback)
      - ./data/playwright-profile:/app/data/playwright-profile

    environment:
      - NODE_ENV=production
      - TZ=Europe/Kyiv

    # Логування в Docker
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
